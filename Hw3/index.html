<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hw3 React Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-6j1NpxBchDbVeZs8CKpqnbvQwUS03GixwVLUZZc6V+eX5QTSJpR2AgNnl0+z2Anq" crossorigin="anonymous">
  <style>
    body { background: #f8f9fa; min-height: 100vh; }
    .notification { transition: opacity 0.2s ease, transform 0.2s ease; opacity: 0; transform: translateY(-8px); }
    .notification.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const menuData = [
      { category: 'Appetizers', items: [
        { name: 'Garlic Bread', price: 5.99 },
        { name: 'Chicken Wings', price: 8.99 },
        { name: 'Mozzarella Sticks', price: 6.99 },
      ]},
      { category: 'Main Courses', items: [
        { name: 'Grilled Salmon', price: 18.99 },
        { name: 'Steak Frites', price: 22.99 },
        { name: 'Chicken Parmesan', price: 16.99 },
      ]},
      { category: 'Desserts', items: [
        { name: 'Chocolate Cake', price: 6.99 },
        { name: 'Tiramisu', price: 7.99 },
        { name: 'Ice Cream', price: 4.99 },
      ]},
    ];

    function formatCurrency(value) {
      return '$' + value.toFixed(2);
    }

    function App() {
      const [cart, setCart] = useState({});
      const [notification, setNotification] = useState('');

      useEffect(() => {
        if (!notification) return;
        const timer = setTimeout(() => setNotification(''), 1800);
        return () => clearTimeout(timer);
      }, [notification]);

      const addToCart = (item) => {
        setCart(prev => {
          const next = { ...prev };
          next[item.name] = next[item.name]
            ? { ...next[item.name], quantity: next[item.name].quantity + 1 }
            : { ...item, quantity: 1 };
          return next;
        });
        setNotification(`Added ${item.name} to cart.`);
      };

      const removeOne = (name) => {
        setCart(prev => {
          if (!prev[name]) return prev;
          const next = { ...prev };
          if (next[name].quantity <= 1) {
            delete next[name];
          } else {
            next[name] = { ...next[name], quantity: next[name].quantity - 1 };
          }
          return next;
        });
        setNotification(`Removed one ${name}.`);
      };

      const clearCart = () => {
        if (Object.keys(cart).length === 0) return;
        setCart({});
        setNotification('All items removed from cart.');
      };

      const total = Object.values(cart).reduce((sum, item) => sum + item.price * item.quantity, 0);

      return (
        <div className="container py-5">
          <header className="text-center mb-4">
            <h1 className="mb-2">Top Tier Italzi React</h1>
            <p className="text-secondary mb-0">Click Add to place menu items into the cart, then remove or clear them.</p>
          </header>
          <div className="row g-4">
            <section className="col-lg-7">
              <div className="card shadow-sm h-100">
                <div className="card-body">
                  <h2 className="card-title h5 mb-3">Menu</h2>
                  {menuData.map(section => (
                    <div key={section.category} className="mb-4">
                      <h3 className="h6 mb-3 text-uppercase text-muted">{section.category}</h3>
                      <div className="list-group">
                        {section.items.map(item => (
                          <div key={item.name} className="list-group-item d-flex justify-content-between align-items-center gap-3">
                            <div>
                              <div className="fw-semibold">{item.name}</div>
                              <div className="text-muted small">{formatCurrency(item.price)}</div>
                            </div>
                            <button className="btn btn-sm btn-primary" type="button" onClick={() => addToCart(item)}>Add</button>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
            <section className="col-lg-5">
              <div className="card shadow-sm h-100">
                <div className="card-body d-flex flex-column h-100">
                  <h2 className="card-title h5 mb-3">Shopping Cart</h2>
                  <div className={`alert alert-warning notification ${notification ? 'visible' : ''}`} role="status">
                    {notification || 'Add an item to see updates here.'}
                  </div>
                  <div className="flex-grow-1">
                    {Object.keys(cart).length === 0 ? (
                      <p className="text-muted">Your cart is empty.</p>
                    ) : (
                      <div className="list-group">
                        {Object.values(cart).map(item => (
                          <div key={item.name} className="list-group-item d-flex align-items-center justify-content-between gap-3">
                            <div>
                              <div className="fw-semibold">{item.name}</div>
                              <div className="text-muted small">{formatCurrency(item.price)} each</div>
                            </div>
                            <div className="text-end">
                              <div>{item.quantity}</div>
                              <div className="text-muted small">{formatCurrency(item.price * item.quantity)}</div>
                            </div>
                            <button className="btn btn-sm btn-outline-danger" type="button" onClick={() => removeOne(item.name)}>Remove</button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                  <div className="d-flex justify-content-between align-items-center mt-4 pt-2 border-top">
                    <strong>Total: {formatCurrency(total)}</strong>
                    <button className="btn btn-danger" type="button" onClick={clearCart}>Remove All</button>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
