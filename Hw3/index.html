<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hw3 React Restaurant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-6j1NpxBchDbVeZs8CKpqnbvQwUS03GixwVLUZZc6V+eX5QTSJpR2AgNnl0+z2Anq" crossorigin="anonymous">
  <style>
    body { margin: 0; background: #f8f9fa; font-family: Arial, sans-serif; }
    .hero-section { min-height: 420px; display: flex; align-items: center; }
    .object-fit-cover { object-fit: cover; }
    .transition { transition: opacity 0.8s ease; }
    .navbar-toggler { border: none; }
    .navbar-toggler-icon { width: 1.5rem; height: 1.5rem; background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='rgba%280,0,0,0.7%29' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E"); }
    .menu-item, .cart-item { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .menu-item:hover, .cart-item:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,.06); }
    .card-rounded { border-radius: 1.5rem; }
    .nav-link:hover { color: #ff6347 !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const menuData = [
      { category: 'Appetizers', items: [
        { name: 'Garlic Bread', price: 5.99 },
        { name: 'Chicken Wings', price: 8.99 },
        { name: 'Mozzarella Sticks', price: 6.99 },
      ]},
      { category: 'Main Courses', items: [
        { name: 'Grilled Salmon', price: 18.99 },
        { name: 'Steak Frites', price: 22.99 },
        { name: 'Chicken Parmesan', price: 16.99 },
      ]},
      { category: 'Desserts', items: [
        { name: 'Chocolate Cake', price: 6.99 },
        { name: 'Tiramisu', price: 7.99 },
        { name: 'Ice Cream', price: 4.99 },
      ]},
    ];

    const galleryImages = [
      'https://tastesbetterfromscratch.com/wp-content/uploads/2023/03/Chicken-Parmesan-1.jpg',
      'https://www.thecookierookie.com/wp-content/uploads/2023/05/featured-grilled-salmon-recipe.jpg',
      'https://upload.wikimedia.org/wikipedia/commons/9/9a/Reel_and_Brand_-_September_2021_-_Sarah_Stierch_05.jpg',
      'https://bakerbynature.com/wp-content/uploads/2015/02/Sweet-and-Spicy-Sriracha-Chicken-Wings-0-6.jpg',
      'https://static01.nyt.com/images/2017/04/05/dining/05COOKING-TIRAMISU1/05COOKING-TIRAMISU1-googleFourByThree-v2.jpg',
      'https://static01.nyt.com/images/2025/08/12/multimedia/12FD-ICE-CREAMREX1-SL-Easy-Homemade-Ice-Cream-bzhv/12FD-ICE-CREAMREX1-SL-Easy-Homemade-Ice-Cream-bzhv-mediumSquareAt3X.jpg',
    ];

    function formatCurrency(value) {
      return '$' + value.toFixed(2);
    }

    function Header({ navOpen, onToggle }) {
      return (
        <nav className="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
          <div className="container-fluid">
            <a className="navbar-brand d-flex align-items-center gap-2" href="#home">
              <span role="img" aria-label="Dining">🍽️</span>
              <span>Top Tier Italzi</span>
            </a>
            <button className="navbar-toggler" type="button" aria-expanded={navOpen} onClick={() => onToggle(!navOpen)}>
              <span className="navbar-toggler-icon"></span>
            </button>
            <div className={`collapse navbar-collapse ${navOpen ? 'show' : ''}`}>
              <ul className="navbar-nav ms-auto mb-2 mb-lg-0">
                {['home', 'menu', 'about', 'contact'].map((section) => (
                  <li className="nav-item" key={section}>
                    <a className="nav-link" href={`#${section}`} onClick={() => onToggle(false)}>{section.charAt(0).toUpperCase() + section.slice(1)}</a>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        </nav>
      );
    }

    function Hero() {
      return (
        <section id="home" className="hero-section text-white" style={{ backgroundImage: 'linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.65)), url(https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&h=500&q=80)', backgroundSize: 'cover', backgroundPosition: 'center' }}>
          <div className="container py-6 text-center">
            <h1 className="display-5 fw-bold">Welcome to Top Tier Italzi</h1>
            <p className="lead text-light mb-4">Fresh food, great atmosphere, happy customers.</p>
            <a href="#menu" className="btn btn-warning btn-lg shadow">View Menu</a>
          </div>
        </section>
      );
    }

    function MenuItem({ item, onAdd }) {
      return (
        <div className="menu-item d-flex align-items-center justify-content-between bg-white rounded-4 p-3 mb-3 shadow-sm">
          <div>
            <h6 className="mb-1">{item.name}</h6>
            <p className="mb-0 text-muted small">Freshly prepared and ready to enjoy.</p>
          </div>
          <div className="d-flex align-items-center gap-2">
            <span className="badge bg-secondary">{formatCurrency(item.price)}</span>
            <button className="btn btn-sm btn-primary" type="button" onClick={() => onAdd(item)}>Add</button>
          </div>
        </div>
      );
    }

    function MenuSection({ section, onAdd }) {
      return (
        <div className="col-md-4 mb-4" key={section.category}>
          <div className="card card-rounded border-0 shadow-sm h-100">
            <div className="card-body">
              <h3 className="h5 mb-3 text-uppercase text-muted">{section.category}</h3>
              {section.items.map(item => <MenuItem key={item.name} item={item} onAdd={onAdd} />)}
            </div>
          </div>
        </div>
      );
    }

    function CartItem({ item, onRemove }) {
      return (
        <div className="cart-item d-flex flex-column flex-sm-row align-items-sm-center justify-content-between bg-white rounded-4 p-3 shadow-sm mb-3">
          <div>
            <h6 className="mb-1">{item.name}</h6>
            <p className="mb-0 text-muted small">{formatCurrency(item.price)} each</p>
          </div>
          <div className="text-end mb-3 mb-sm-0">
            <p className="mb-1 fw-semibold">x{item.quantity}</p>
            <p className="mb-0 text-muted small">{formatCurrency(item.price * item.quantity)}</p>
          </div>
          <button className="btn btn-outline-danger btn-sm" type="button" onClick={() => onRemove(item.name)}>Remove</button>
        </div>
      );
    }

    function Gallery({ images, current }) {
      return (
        <div className="position-relative overflow-hidden rounded-4 shadow-sm" style={{ minHeight: '280px' }}>
          {images.map((src, index) => (
            <img key={src} src={src} alt={`Food ${index + 1}`} className={`position-absolute top-0 start-0 w-100 h-100 object-fit-cover transition ${index === current ? 'opacity-100' : 'opacity-0'}`} style={{ zIndex: index === current ? 2 : 1 }} />
          ))}
        </div>
      );
    }

    function App() {
      const [cart, setCart] = useState({});
      const [notification, setNotification] = useState('Pick a dish to add it to your cart.');
      const [navOpen, setNavOpen] = useState(false);
      const [currentSlide, setCurrentSlide] = useState(0);

      useEffect(() => {
        const interval = setInterval(() => {
          setCurrentSlide((prev) => (prev + 1) % galleryImages.length);
        }, 3000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (!notification) return;
        const timer = setTimeout(() => setNotification(''), 2000);
        return () => clearTimeout(timer);
      }, [notification]);

      const addToCart = (item) => {
        setCart((prev) => {
          const next = { ...prev };
          next[item.name] = next[item.name]
            ? { ...next[item.name], quantity: next[item.name].quantity + 1 }
            : { ...item, quantity: 1 };
          return next;
        });
        setNotification(`Added ${item.name} to cart.`);
      };

      const removeOne = (name) => {
        setCart((prev) => {
          const next = { ...prev };
          if (!next[name]) return next;
          if (next[name].quantity <= 1) {
            delete next[name];
          } else {
            next[name] = { ...next[name], quantity: next[name].quantity - 1 };
          }
          return next;
        });
        setNotification(`Removed one ${name}.`);
      };

      const clearCart = () => {
        if (!Object.keys(cart).length) return;
        setCart({});
        setNotification('All items removed from cart.');
      };

      const cartItems = useMemo(() => Object.values(cart), [cart]);
      const total = useMemo(() => cartItems.reduce((sum, item) => sum + item.price * item.quantity, 0), [cartItems]);

      return (
        <>
          <Header navOpen={navOpen} onToggle={setNavOpen} />
          <main className="mt-5 pt-4">
            <Hero />
            <section id="menu" className="py-5">
              <div className="container">
                <div className="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
                  <div>
                    <h2>Our Menu</h2>
                    <p className="text-muted">Tap the Add button to place items into your cart.</p>
                  </div>
                  <div className="badge bg-warning text-dark py-2 px-3 rounded-pill">{cartItems.length} item{cartItems.length === 1 ? '' : 's'} in cart</div>
                </div>
                <div className="row">
                  {menuData.map(section => <MenuSection key={section.category} section={section} onAdd={addToCart} />)}
                </div>
              </div>
            </section>
            <section id="cart" className="py-5 bg-light">
              <div className="container">
                <div className="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 gap-3">
                  <h2>Shopping Cart</h2>
                  <button className="btn btn-danger" type="button" onClick={clearCart} disabled={!cartItems.length}>Remove All</button>
                </div>
                <div className={`alert ${notification ? 'alert-info' : 'alert-secondary'} ${notification ? 'show' : ''}`} role="status" aria-live="polite">
                  {notification || 'Your cart is empty. Add something tasty!'}
                </div>
                <div className="row gy-3">
                  <div className="col-lg-8">
                    {cartItems.length === 0 ? (
                      <div className="card card-rounded border-0 shadow-sm p-4 text-center text-muted">Your cart is empty.</div>
                    ) : (
                      cartItems.map(item => <CartItem key={item.name} item={item} onRemove={removeOne} />)
                    )}
                  </div>
                  <div className="col-lg-4">
                    <div className="card card-rounded border-0 shadow-sm p-4 h-100">
                      <h5 className="mb-3">Order Summary</h5>
                      <p className="mb-2 text-muted">Estimated total</p>
                      <h3>{formatCurrency(total)}</h3>
                      <p className="small text-muted">Modify quantities by removing items one at a time.</p>
                    </div>
                  </div>
                </div>
              </div>
            </section>
            <section className="py-5">
              <div className="container">
                <div className="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 gap-3">
                  <div>
                    <h2>Gallery</h2>
                    <p className="text-muted mb-0">See our most popular dishes in rotation.</p>
                  </div>
                </div>
                <Gallery images={galleryImages} current={currentSlide} />
              </div>
            </section>
            <section id="about" className="py-5 bg-light">
              <div className="container">
                <div className="row gy-4 align-items-center">
                  <div className="col-lg-6">
                    <h2>About Us</h2>
                    <p>Top Tier Italzi opened in 2000 with a simple mission: to make a lot of money with good food.</p>
                    <p>We believe in quality over quantity, using only the freshest ingredients and traditional cooking methods. Come experience the difference that real food makes!</p>
                  </div>
                  <div className="col-lg-6">
                    <div className="card card-rounded border-0 shadow-sm p-4">
                      <h5 className="mb-3">What makes us special</h5>
                      <ul className="list-unstyled mb-0">
                        <li>• Classic Italian-inspired menu</li>
                        <li>• Friendly service with modern design</li>
                        <li>• High-quality ingredients every day</li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            </section>
            <section id="contact" className="py-5">
              <div className="container">
                <div className="row gy-4">
                  <div className="col-lg-4">
                    <div className="card card-rounded border-0 shadow-sm p-4 h-100">
                      <h3>Visit Us</h3>
                      <p className="mb-1">695 Park Ave, New York, NY 10065</p>
                      <p className="mb-1">Phone: (555) 123-4567</p>
                      <p className="mb-0">Hours: Mon-Sun 11am-10pm</p>
                    </div>
                  </div>
                  <div className="col-lg-4">
                    <div className="card card-rounded border-0 shadow-sm p-4 h-100">
                      <h3>Send us a message</h3>
                      <form>
                        <div className="mb-3">
                          <input className="form-control" type="text" placeholder="Name" required />
                        </div>
                        <div className="mb-3">
                          <input className="form-control" type="email" placeholder="Email" required />
                        </div>
                        <div className="mb-3">
                          <textarea className="form-control" rows="4" placeholder="Your Message" required></textarea>
                        </div>
                        <button className="btn btn-warning w-100" type="submit">Send</button>
                      </form>
                    </div>
                  </div>
                  <div className="col-lg-4">
                    <div className="card card-rounded border-0 shadow-sm overflow-hidden h-100">
                      <iframe className="w-100 h-100" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6043.470822794022!2d-73.96710402431674!3d40.767843834195546!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c258eb899f0889%3A0xb5e90aa7d877ee1f!2sHunter%20College!5e0!3m2!1sen!2sus!4v1773086260430!5m2!1sen!2sus" style="min-height: 250px; border: 0;" allowFullScreen loading="lazy" referrerPolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </main>
          <footer className="py-4 bg-dark text-white">
            <div className="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
              <div className="d-flex gap-3">
                <a className="text-white text-decoration-none" href="#">Facebook</a>
                <a className="text-white text-decoration-none" href="#">Instagram</a>
                <a className="text-white text-decoration-none" href="#">Twitter</a>
              </div>
              <small className="mb-0">© 2024 Top Tier Italzi. All rights reserved.</small>
            </div>
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
